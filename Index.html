<!DOCTYPE html>
<html lang="lv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 Daudz laimes dzimšanas dienā!</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
overflow:hidden;
text-align:center;
color:white;

background:
linear-gradient(#10194f,#7b1fa2,#ff4081);

}


/* VIRSRKSTS */

h1{

margin-top:35px;
font-size:50px;
animation:pulse 2s infinite;

}


h2{

margin-top:15px;

}


@keyframes pulse{

50%{
transform:scale(1.08);
}

}



/* DĀVANA */

.mainGift{

font-size:100px;
margin-top:30px;
animation:bounce 1s infinite;

}


@keyframes bounce{

50%{
transform:translateY(-20px);
}

}



/* TORTE */

.cake{

font-size:90px;

}



/* 3D BALONI */


.balloon{

position:absolute;
bottom:-150px;

width:80px;
height:100px;

border-radius:50%;

box-shadow:
inset -15px -20px 30px rgba(0,0,0,.3),
inset 15px 15px 20px white,
0 15px 20px black;


animation:
fly 12s linear infinite,
sway 3s infinite;

}


.balloon:before{

content:"";

position:absolute;

width:25px;
height:35px;

background:white;

border-radius:50%;

top:15px;
left:15px;

}


.balloon:after{

content:"";

position:absolute;

width:2px;
height:90px;

background:white;

top:100px;
left:50%;

}



@keyframes fly{

from{
transform:translateY(0);
}

to{
transform:translateY(-130vh);
}

}


@keyframes sway{

50%{
margin-left:20px;
}

}



/* KONFETI */


.confetti{

position:absolute;
top:-20px;

width:12px;
height:18px;

animation:fall linear infinite;

}


@keyframes fall{

to{

transform:
translateY(120vh)
rotate(720deg);

}

}



/* POGA */


button{

margin-top:20px;

padding:15px 35px;

border:none;

border-radius:30px;

font-size:20px;

background:#ffd700;

cursor:pointer;

}



/* PĀRSTEIGUMS */


.surprise{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.8);

justify-content:center;

align-items:center;

z-index:1000;

}



.surpriseBox{

background:white;

color:#ff4081;

padding:30px;

border-radius:25px;

}



.close{

cursor:pointer;

font-size:20px;

}



/* DĀVANAS ATVĒRŠANA */


.giftBox{

position:relative;

width:150px;

height:150px;

margin:30px auto;

cursor:pointer;

}



.box{

position:absolute;

bottom:0;

width:150px;

height:100px;

background:#ff3366;

border-radius:10px;

font-size:70px;

}



.lid{

position:absolute;

top:20px;

width:160px;

height:35px;

background:#ff6699;

border-radius:10px;

font-size:35px;

z-index:2;

transition:1s;

}



.giftOpen .lid{

transform:
translateY(-90px)
rotate(-20deg);

}



.giftOpen .box{

animation:shake .5s;

}



@keyframes shake{

50%{
transform:rotate(10deg);
}

}



/* SPĪDUMI */


.sparkle{

position:absolute;

font-size:30px;

animation:spark 1s;

}



@keyframes spark{

to{

transform:
translateY(-100px)
scale(2);

opacity:0;

}

}



/* VIDEO */


video{

margin-top:20px;

border-radius:15px;

}

</style>

</head>


<body>

<h1>
🎉 Daudz laimes tavos 16 gados! 🎉
</h1>
<h2>
Lai Visi merķi izspildas un neaizmirsti šo dienu! 💖
</h2>

<h3>
Veidoja Ģima
</h3>


<div class="mainGift">
🎁
</div>


<div class="cake">
🎂
</div>




<button onclick="openSurprise()">
🎁Te tevi gaida davāna 🎁
</button>


<audio id="music" loop>

<source src="happybirthday.mp3" type="audio/mpeg">

</audio>






<!-- PĀRSTEIGUMA LOGS -->


<div id="surprise" class="surprise">


<div class="surpriseBox">


<h1>
🎁 Pārsteigums!
</h1>


<div class="giftBox" onclick="openGift()">


<div class="lid">
🎀
</div>


<div class="box">
🎁
</div>


</div>


<p id="giftText">
Spied uz dāvanu!
</p>



<video id="video"
width="350"
controls
style="display:none">

<source src="video.mp4">

</video>


<br><br>


<span class="close"
onclick="closeSurprise()">

❌ Aizvērt

</span>


</div>


</div>





<script>


// MŪZIKA


function startMusic(){

let m=document.getElementById("music");

m.volume=.4;

m.play();

}





// ATVĒRT PĀRSTEIGUMU


function openSurprise(){

document.getElementById("music").pause();

document.getElementById("surprise")
.style.display="flex";

}





// DĀVANAS ANIMĀCIJA


function openGift(){


let gift=document.querySelector(".giftBox");

gift.classList.add("giftOpen");


for(let i=0;i<20;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*150+"px";

gift.appendChild(s);


setTimeout(()=>s.remove(),1000);

}



setTimeout(()=>{


document.getElementById("giftText")
.innerHTML="🎬 Video sākas!";


let music=document.getElementById("music");

music.pause();


let v=document.getElementById("video");

v.style.display="block";

v.play();


},1500);


}




// AIZVĒRT


function closeSurprise(){


let v=document.getElementById("video");

v.pause();

v.currentTime=0;


document.getElementById("surprise")
.style.display="none";


document.getElementById("music")
.play();


}





// BALONI


let colors=[
"red",
"yellow",
"blue",
"Black",
"pink",
"White"
];


for(let i=0;i<35;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=
colors[Math.floor(Math.random()*6)];

document.body.appendChild(b);

}





// KONFETI


for(let i=0;i<200;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
colors[Math.floor(Math.random()*6)];

c.style.animationDuration=
3+Math.random()*5+"s";


document.body.appendChild(c);

}





// UGUŅOŠANA


setInterval(()=>{


let f=document.createElement("div");

f.style.position="absolute";

f.style.left=Math.random()*100+"vw";

f.style.top=Math.random()*60+"vh";

f.style.fontSize="50px";

f.innerHTML="🎆";


document.body.appendChild(f);


setTimeout(()=>f.remove(),1000);


},500);



</script>
<script>

window.onload=function(){

let music=document.getElementById("music");

music.volume=0.4;

music.play().catch(function(){

console.log("Pārlūks bloķēja automātisko skaņu");

});

};
</script>

</body>
</html>
